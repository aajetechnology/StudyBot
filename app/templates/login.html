{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center py-5" style="min-height: 80vh;">
        <div class="col-11 col-md-6 col-lg-4">
            
            <div id="tg-loader" class="text-center" style="display: none;">
                <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <h4 class="fw-bold">Authenticating...</h4>
                <p class="text-muted">Connecting your Telegram account to StudBot</p>
            </div>

            <div id="web-login-card" class="glass-card p-4 p-md-5 rounded-4 fade-in">
                <div class="text-center mb-5">
                    <h2 class="fw-bold text-gradient">Welcome Back</h2>
                    <p class="text-muted small">Elevate your learning with AI</p>
                </div>

                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase tracking-wider opacity-60">Email Address</label>
                        <input type="email" name="email" class="form-control form-input-modern shadow-none" id="loginEmail" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-5">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label class="form-label small fw-bold text-uppercase tracking-wider opacity-60 mb-0">Password</label>
                            <a href="#" class="text-decoration-none small text-primary opacity-75">Forgot?</a>
                        </div>
                        <input type="password" name="password" class="form-control form-input-modern shadow-none" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-premium w-100 py-3 shadow-lg rounded-pill fs-6">Sign In</button>
                </form>
                
                <div class="text-center mt-5">
                    <span class="text-muted small">New to StudBot?</span>
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none small fw-bold text-primary">Create Account</a>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // 1. Theme Adoption: Immediate check
    if (tg.colorScheme === 'dark') {
        document.body.classList.add('tg-dark');
    }

    // 2. Telegram Auto-Login Logic
    if (tg.initData) {
        // Hide the web form and show the loader for Telegram users
        document.getElementById('web-login-card').style.display = 'none';
        document.getElementById('tg-loader').style.display = 'block';

        fetch("{{ url_for('auth.telegram_login') }}", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ initData: tg.initData })
        })
        .then(res => {
            if (!res.ok) throw new Error("Auth Failed");
            return res.json();
        })
        .then(data => {
            if (data.success) {
                // Redirect to dashboard
                window.location.href = data.redirect;
            } else {
                // If TG auth fails for some reason, show the form again
                document.getElementById('web-login-card').style.display = 'block';
                document.getElementById('tg-loader').style.display = 'none';
                alert("Telegram Auth failed. Please login manually.");
            }
        })
        .catch(err => {
            console.error(err);
            document.getElementById('web-login-card').style.display = 'block';
            document.getElementById('tg-loader').style.display = 'none';
        });
    }
</script>
{% endblock %}
